name: ezWGD-AutoCI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # step1 code quality check
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v5
      - name: Setup Python environment.
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies.
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv pip -r pyproject.toml
          uv pip install ruff pytest pytest-cov uv-build mkdocs mkdocs-static-i18n

      - name: Script linting check.
        run: |
          uv run ruff check --fix

      - name: Auto testing, and generating coverage report.
        run: |
          pytest

